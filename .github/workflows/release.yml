name: release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate semantic version
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be in x.x.x format. Got: $TAG"
            exit 1
          fi

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image repo
        id: vars
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/${OWNER}/${REPO}" >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.vars.outputs.image }}:${{ github.ref_name }}
            ${{ steps.vars.outputs.image }}:latest

      - name: Update deployment image tag
        run: |
          IMAGE="${{ steps.vars.outputs.image }}:${GITHUB_REF_NAME}"
          sed -i "s|^\([[:space:]]*image:[[:space:]]*\).*|\1${IMAGE}|" k8s/deployment.yaml

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
          git checkout "${DEFAULT_BRANCH}"
          git add k8s/deployment.yaml
          git diff --cached --quiet && echo "No manifest changes" && exit 0
          git commit -m "chore(release): image ${GITHUB_REF_NAME} [skip ci]"
          git push origin "HEAD:${DEFAULT_BRANCH}"
